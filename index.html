<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attune - 432Hz Music Player</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #111;
            color: #e0e0e0;
            line-height: 1.6;
        }

        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            text-align: center;
        }
        h1 {
            font-size: 3rem;
            color: #fff;
            margin-bottom: 4px;
            letter-spacing: 2px;
        }
        .accent { color: #39FF14; }
        .tagline {
            font-size: 1.2rem;
            color: #888;
            margin-bottom: 32px;
        }
        .description {
            color: #bbb;
            font-size: 1.05rem;
            max-width: 520px;
            margin-bottom: 40px;
        }
        .badge { display: inline-block; }
        .badge img { height: 60px; }

        .showcase {
            padding: 40px 20px 60px;
            overflow: hidden;
        }
        .showcase-track {
            display: flex;
            gap: 24px;
            animation: scroll 30s linear infinite;
            width: max-content;
        }
        .showcase-track img {
            height: 520px;
            border-radius: 16px;
            flex-shrink: 0;
        }
        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .showcase-track:hover {
            animation-play-state: paused;
        }

        .footer-section {
            text-align: center;
            padding: 40px 20px 48px;
        }
        .links a {
            color: #39FF14;
            text-decoration: none;
            margin: 0 12px;
            font-size: 0.9rem;
        }
        .links a:hover { text-decoration: underline; }
        footer {
            margin-top: 24px;
            color: #555;
            font-size: 0.8rem;
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.2rem; }
            .showcase-track img { height: 380px; }
        }
    </style>
</head>
<body>
    <section class="hero">
        <h1>ATTUNE</h1>
        <p class="tagline"><span class="accent">432Hz</span> Music Player for Android</p>
        <p class="description">
            Listen to your music library in 432Hz tuning.
            Attune retunes your local audio files in real-time with
            studio-grade sample rate conversion - no re-encoding needed.
        </p>
        <div class="badge">
            <a href="https://play.google.com/store/apps/details?id=app.attune.player">
                <img src="https://play.google.com/intl/en_us/badges/static/images/badges/en_badge_web_generic.png" alt="Get it on Google Play">
            </a>
        </div>
    </section>

    <section class="showcase">
        <div class="showcase-track">
            <img src="images/01_hero.png" alt="Tune your music naturally">
            <img src="images/02_engine.png" alt="Studio-grade 432Hz engine">
            <img src="images/03_blur.png" alt="Live blurred backgrounds">
            <img src="images/04_library.png" alt="Clean by design">
            <img src="images/05_personalize.png" alt="Make it yours">
            <img src="images/06_filter.png" alt="Filter out the noise">
            <img src="images/07_sync.png" alt="Always up to date">
            <img src="images/01_hero.png" alt="Tune your music naturally">
            <img src="images/02_engine.png" alt="Studio-grade 432Hz engine">
            <img src="images/03_blur.png" alt="Live blurred backgrounds">
            <img src="images/04_library.png" alt="Clean by design">
            <img src="images/05_personalize.png" alt="Make it yours">
            <img src="images/06_filter.png" alt="Filter out the noise">
            <img src="images/07_sync.png" alt="Always up to date">
        </div>
    </section>

    <section class="footer-section">
        <div class="links">
            <a href="privacy-policy.html">Privacy Policy</a>
        </div>
        <footer>&copy; 2026 Attune</footer>
    </section>
</body>
</html>
